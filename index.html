<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>Lista de Mercado Mensal</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>
<h1>Lista de Mercado Mensal</h1>

<div id="list-container" role="list" aria-label="Lista de itens de mercado">
  <ul id="item-list" role="list">
    <!-- Itens serão inseridos aqui dinamicamente -->
  </ul>
</div>

<button id="add-item-button" aria-label="Adicionar novo item à lista">➕ Adicionar Item</button>

<div id="total-container" aria-live="polite">Total: R$ 0,00</div>

<script src="script.js"></script>
</body>
</html>
